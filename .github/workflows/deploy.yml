name: Deploy Astro site to GitHub Pages

# Builds the Astro site and publishes ONLY the dist/ folder to the gh-pages branch.
# Do NOT set GitHub Pages to deploy from main — that triggers Jekyll on source files.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_WEB3FORMS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_KEY }}
          PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io
          PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # peaceiris adds .nojekyll automatically — prevents Jekyll processing
